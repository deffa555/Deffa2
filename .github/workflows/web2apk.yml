name: Web to APK Converter

on:
  workflow_dispatch:
    inputs:
      web_url:
        description: 'Website URL'
        required: true
        type: string
      app_name:
        description: 'App Name'
        required: true
        type: string
      icon_url:
        description: 'Icon URL'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Download Icon
        run: |
          echo "📥 Downloading icon from: ${{ github.event.inputs.icon_url }}"
          curl -L -o icon.png "${{ github.event.inputs.icon_url }}"
          
          if [ ! -f "icon.png" ] || [ ! -s "icon.png" ]; then
            echo "❌ Gagal download icon!"
            exit 1
          fi
          
          echo "✅ Icon downloaded successfully!"
          file icon.png

      - name: Create WebView App
        run: |
          echo "📱 Creating Flutter WebView project..."
          flutter create --org com.webtoapk --project-name webview_app webview_project
          cd webview_project
          
          echo "📦 Installing dependencies..."
          flutter pub add webview_flutter
          flutter pub add http
          
          echo "🖼️ Copying icon..."
          cp ../icon.png .
          
          echo "📝 Updating pubspec.yaml..."
          sed -i "s/name: webview_app/name: ${{ github.event.inputs.app_name }}/g" pubspec.yaml
          
          echo "📝 Creating main.dart..."
          cat > lib/main.dart << 'DART'
          import 'package:flutter/material.dart';
          import 'package:webview_flutter/webview_flutter.dart';

          void main() {
            runApp(const MyApp());
          }

          class MyApp extends StatelessWidget {
            const MyApp({super.key});

            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                title: '${{ github.event.inputs.app_name }}',
                theme: ThemeData(
                  primarySwatch: Colors.blue,
                  useMaterial3: true,
                ),
                home: const WebViewScreen(),
                debugShowCheckedModeBanner: false,
              );
            }
          }

          class WebViewScreen extends StatefulWidget {
            const WebViewScreen({super.key});

            @override
            State<WebViewScreen> createState() => _WebViewScreenState();
          }

          class _WebViewScreenState extends State<WebViewScreen> {
            late final WebViewController controller;

            @override
            void initState() {
              super.initState();
              controller = WebViewController()
                ..setJavaScriptMode(JavaScriptMode.unrestricted)
                ..setBackgroundColor(const Color(0x00000000))
                ..setNavigationDelegate(
                  NavigationDelegate(
                    onProgress: (int progress) {
                      // Update progress if needed
                    },
                    onPageStarted: (String url) {},
                    onPageFinished: (String url) {},
                    onWebResourceError: (WebResourceError error) {},
                  ),
                )
                ..loadRequest(Uri.parse('${{ github.event.inputs.web_url }}'));
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                body: WebViewWidget(controller: controller),
              );
            }
          }
          DART

      - name: Build APK
        run: |
          cd webview_project
          echo "📦 Getting dependencies..."
          flutter pub get --verbose
          
          echo "🚀 Building RELEASE APK..."
          flutter build apk --release --verbose || {
            echo "❌ Build release gagal!"
            echo "🔧 Mencoba build dengan --no-shrink..."
            flutter build apk --release --no-shrink || {
              exit 1
            }
          }
          
          echo "✅ Build selesai!"
          echo "📂 Hasil build:"
          ls -la build/app/outputs/flutter-apk/ || echo "⚠️ Folder APK tidak ditemukan!"

      - name: Find and Upload APK
        run: |
          cd webview_project/
          APK_PATH=$(find build/app/outputs/flutter-apk/ -name "*.apk" | head -1)
          if [ -n "$APK_PATH" ]; then
            echo "✅ APK ditemukan: $APK_PATH"
            echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV
          else
            echo "❌ APK tidak ditemukan!"
            echo "📂 Mencari di seluruh folder..."
            find . -name "*.apk" 2>/dev/null || echo "Tidak ada APK"
            exit 1
          fi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}-web2apk
          path: webview_project/${{ env.APK_PATH }}
          retention-days: 7
