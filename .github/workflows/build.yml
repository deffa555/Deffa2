name: Flutter Build APK

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: 'URL ZIP file'
        required: true
        type: string
      tag:
        description: 'Release tag'
        required: true
        type: string
      build_type:
        description: 'Build type (debug/release)'
        required: false
        default: 'release'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Download and Extract ZIP
        run: |
          echo "📥 Downloading project..."
          curl -L -o project.zip -H "Accept: application/octet-stream" "${{ github.event.inputs.zip_url }}"
          
          if [ ! -f "project.zip" ] || [ ! -s "project.zip" ]; then
            echo "❌ Gagal download ZIP!"
            exit 1
          fi
          
          mkdir -p project
          unzip -q project.zip -d project/ || { echo "❌ Gagal ekstrak!"; exit 1; }
          
          # Cari pubspec.yaml
          PUBSPEC_PATH=$(find project -name "pubspec.yaml" | head -1)
          if [ -n "$PUBSPEC_PATH" ]; then
            echo "✅ Ditemukan pubspec.yaml di: $PUBSPEC_PATH"
            PUBSPEC_DIR=$(dirname "$PUBSPEC_PATH")
            mv "$PUBSPEC_DIR"/* project/ 2>/dev/null || true
          fi
          
          if [ ! -f "project/pubspec.yaml" ]; then
            echo "❌ pubspec.yaml TIDAK DITEMUKAN!"
            find project -type f
            exit 1
          fi
          
          echo "✅ pubspec.yaml ditemukan!"
          cat project/pubspec.yaml

      - name: Get Project Name
        id: project_name
        run: |
          cd project/
          NAME=$(grep "^name:" pubspec.yaml | awk '{print $2}' | tr -d '\r')
          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "📛 Project: $NAME"

      - name: Build APK
        run: |
          cd project/
          
          flutter clean || true
          rm -rf .dart_tool/ .packages pubspec.lock
          
          echo "📦 Flutter pub get..."
          flutter pub get || {
            echo "❌ Gagal, coba tanpa cache..."
            flutter pub get --no-cache || exit 1
          }
          
          echo "✅ Dependencies OK!"
          
          if [ "${{ github.event.inputs.build_type }}" == "debug" ]; then
            echo "🔧 Build DEBUG..."
            flutter build apk --debug || exit 1
          else
            echo "🚀 Build RELEASE..."
            flutter build apk --release || {
              echo "⚠️ Coba --no-shrink..."
              flutter build apk --release --no-shrink || exit 1
            }
          fi
          
          echo "✅ Build selesai!"
          ls -la build/app/outputs/flutter-apk/ || echo "⚠️ APK tidak ditemukan!"

      - name: 🔥 UPLOAD APK KE RELEASE
        run: |
          cd project/
          
          # Cari APK
          APK_PATH=$(find build/app/outputs/flutter-apk/ -name "*.apk" | head -1)
          
          if [ -z "$APK_PATH" ]; then
            echo "❌ APK TIDAK DITEMUKAN!"
            find . -name "*.apk" 2>/dev/null || echo "Tidak ada APK"
            exit 1
          fi
          
          echo "✅ APK ditemukan: $APK_PATH"
          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV
          
          # Buat release dengan tag dari input
          echo "📦 Creating release for tag: ${{ github.event.inputs.tag }}"
          
          # Upload ke release menggunakan GitHub CLI
          gh release upload "${{ github.event.inputs.tag }}" "$APK_PATH" \
            --repo "${{ github.repository }}" \
            --clobber || {
              echo "⚠️ Gagal upload ke release, coba pakai API..."
              
              # Fallback: upload via API
              RELEASE_ID=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
                "https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ github.event.inputs.tag }}" \
                | jq -r '.id')
              
              if [ -n "$RELEASE_ID" ] && [ "$RELEASE_ID" != "null" ]; then
                curl -X POST \
                  -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
                  -H "Content-Type: application/vnd.android.package-archive" \
                  --data-binary "@$APK_PATH" \
                  "https://uploads.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID/assets?name=${{ steps.project_name.outputs.name }}.apk"
              fi
            }

      - name: 🔥 UPLOAD APK KE ARTIFACT (FALLBACK)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.project_name.outputs.name }}-apk
          path: project/${{ env.APK_PATH }}
          retention-days: 7
