name: Flutter Build APK

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: 'URL ZIP file'
        required: true
        type: string
      tag:
        description: 'Release tag'
        required: true
        type: string
      build_type:
        description: 'Build type (debug/release)'
        required: false
        default: 'release'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'  # 🔥 PAKE VERSI TERBARU!
          channel: 'stable'
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Download ZIP
        run: |
          curl -L -o project.zip "${{ github.event.inputs.zip_url }}"
          unzip -q project.zip -d project/
          ls -la project/

      - name: Get Project Name
        id: name
        run: |
          cd project/
          if [ -f "pubspec.yaml" ]; then
            NAME=$(grep "^name:" pubspec.yaml | awk '{print $2}')
            echo "name=$NAME" >> $GITHUB_OUTPUT
          else
            echo "name=app" >> $GITHUB_OUTPUT
          fi

      - name: Build APK
        run: |
          cd project/
          flutter clean || true
          rm -rf .dart_tool/ .packages pubspec.lock
          flutter pub get
          flutter build apk --release
          ls -la build/app/outputs/flutter-apk/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.name.outputs.name }}-apk
          path: project/build/app/outputs/flutter-apk/*.apk
          retention-days: 7
