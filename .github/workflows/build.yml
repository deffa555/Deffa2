name: Flutter Build APK

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: 'URL ZIP file'
        required: true
        type: string
      tag:
        description: 'Release tag'
        required: true
        type: string
      build_type:
        description: 'Build type (debug/release)'
        required: false
        default: 'release'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Download and Extract ZIP
        run: |
          echo "📥 Downloading project from: ${{ github.event.inputs.zip_url }}"
          
          curl -L -o project.zip \
            -H "Accept: application/octet-stream" \
            "${{ github.event.inputs.zip_url }}"
          
          if [ ! -f "project.zip" ] || [ ! -s "project.zip" ]; then
            echo "❌ Gagal download ZIP!"
            exit 1
          fi
          
          echo "📦 File size: $(du -h project.zip | cut -f1)"
          
          mkdir -p project
          unzip -q project.zip -d project/ || {
            echo "❌ Gagal ekstrak ZIP!"
            exit 1
          }
          
          echo "📂 Struktur folder:"
          ls -la project/
          
          # 🔥 CARI PUBSPEC.YAML
          echo "🔍 Mencari pubspec.yaml..."
          find project -name "pubspec.yaml" -exec ls -la {} \;
          
          PUBSPEC_PATH=$(find project -name "pubspec.yaml" | head -1)
          if [ -n "$PUBSPEC_PATH" ]; then
            echo "✅ Ditemukan pubspec.yaml di: $PUBSPEC_PATH"
            PUBSPEC_DIR=$(dirname "$PUBSPEC_PATH")
            echo "📁 Folder pubspec: $PUBSPEC_DIR"
            
            # Pindahkan semua isi folder ke root
            mv "$PUBSPEC_DIR"/* project/ 2>/dev/null || true
            mv "$PUBSPEC_DIR"/.[!.]* project/ 2>/dev/null || true
          fi
          
          echo "📂 Struktur setelah:"
          ls -la project/
          
          if [ -f "project/pubspec.yaml" ]; then
            echo "✅ pubspec.yaml ditemukan!"
            cat project/pubspec.yaml
          else
            echo "❌ pubspec.yaml TIDAK DITEMUKAN!"
            find project -type f
            exit 1
          fi

      - name: Get Project Name
        id: project_name
        run: |
          cd project/
          if [ -f "pubspec.yaml" ]; then
            NAME=$(grep "^name:" pubspec.yaml | awk '{print $2}' | tr -d '\r')
            echo "name=$NAME" >> $GITHUB_OUTPUT
            echo "📛 Project name: $NAME"
          else
            echo "❌ pubspec.yaml TIDAK ADA!"
            exit 1
          fi

      - name: 🔥 FORCE FIX pubspec.yaml
        run: |
          cd project/
          
          echo "📄 Isi pubspec.yaml SEBELUM fix:"
          cat pubspec.yaml
          
          # Backup
          cp pubspec.yaml pubspec.yaml.bak
          
          # 🔥 HAPUS SEMUA KOMENTAR DAN KARAKTER ANEH
          sed -i 's/#.*$//g' pubspec.yaml
          sed -i 's/\r$//g' pubspec.yaml
          sed -i '/^[[:space:]]*$/d' pubspec.yaml
          sed -i 's/^[[:space:]]*//' pubspec.yaml
          
          # 🔥 PASTIKAN FORMATNYA BENAR
          cat > pubspec.yaml.tmp << 'EOF'
          name: ${{ steps.project_name.outputs.name }}
          description: A Flutter project
          version: 1.0.0+1
          environment:
            sdk: ">=3.0.0 <4.0.0"
          dependencies:
            flutter:
              sdk: flutter
            cupertino_icons: ^1.0.6
          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^3.0.0
          flutter:
            uses-material-design: true
          EOF
          
          # Gabungkan dengan yang asli
          cat pubspec.yaml.tmp > pubspec.yaml
          
          echo "📄 Isi pubspec.yaml SESUDAH fix:"
          cat pubspec.yaml

      - name: Get Dependencies
        run: |
          cd project/
          flutter clean || true
          rm -rf .dart_tool/ .packages pubspec.lock
          flutter pub get --verbose || {
            echo "❌ Flutter pub get gagal!"
            echo "📄 Coba tanpa cache..."
            flutter pub get --no-cache || exit 1
          }
          echo "✅ Dependencies berhasil diinstall!"

      - name: Build APK
        run: |
          cd project/
          
          if [ "${{ github.event.inputs.build_type }}" == "debug" ]; then
            echo "🔧 Building DEBUG APK..."
            flutter build apk --debug
          else
            echo "🚀 Building RELEASE APK..."
            flutter build apk --release || {
              echo "⚠️ Coba --no-shrink..."
              flutter build apk --release --no-shrink || exit 1
            }
          fi
          
          echo "✅ Build selesai!"
          ls -la build/app/outputs/flutter-apk/ || echo "⚠️ APK tidak ditemukan!"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.project_name.outputs.name }}-apk
          path: project/build/app/outputs/flutter-apk/*.apk
          retention-days: 7
